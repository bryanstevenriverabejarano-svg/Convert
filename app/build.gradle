plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    // 👇 Para que se genere salve.R
    namespace 'salve'
    compileSdk 35

    defaultConfig {
        // 👇 ID del paquete de tu app (debe coincidir con los imports salve.*)
        applicationId "salve"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // ✅ Solo un bloque kotlinOptions, usando Java 11
    kotlinOptions {
        jvmTarget = '11'
    }

    buildFeatures {
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion '1.4.3'
    }

    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    // 🔥 Quitado: implementation project(":mlc4j")

    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.1'
    implementation 'com.github.jeziellago:compose-markdown:0.5.2'
    implementation 'androidx.activity:activity-compose:1.7.1'
    implementation platform('androidx.compose:compose-bom:2022.10.00')
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.6.1'
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3:1.1.0'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.navigation:navigation-compose:2.5.3'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation fileTree(
            dir: 'src/main/libs',
            include: [ '*.jar'],
            exclude: []
    )
    // ✅ TensorFlow Lite (núcleo)
    implementation 'org.tensorflow:tensorflow-lite:2.14.0'

    // ✅ ROOM correcto para Android (Java)
    implementation "androidx.room:room-runtime:2.8.3"
    annotationProcessor "androidx.room:room-compiler:2.8.3"

    // WorkManager
    implementation 'androidx.work:work-runtime:2.11.0'

    // Material clásico (FAB + vistas XML)
    implementation 'com.google.android.material:material:1.12.0'

    // PDFBox para Android (com.tom_roush.*)
    implementation 'com.tom-roush:pdfbox-android:2.0.27.0'

    // ML Kit / visión
    implementation 'com.google.mlkit:vision-common:17.3.0'
    implementation 'com.google.android.gms:play-services-mlkit-face-detection:17.1.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    androidTestImplementation platform('androidx.compose:compose-bom:2022.10.00')
    androidTestImplementation 'androidx.compose.ui:ui-test-junit4'
    debugImplementation 'androidx.compose.ui:ui-tooling'
    debugImplementation 'androidx.compose.ui:ui-test-manifest'
}
